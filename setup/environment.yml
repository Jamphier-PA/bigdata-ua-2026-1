name: bigdata-ua
channels:
  - conda-forge
  - defaults
dependencies:
  # Python base
  - python=3.11
  - pip

  # Data manipulation
  - pandas=2.2.*
  - numpy=1.26.*
  - pyarrow=15.*

  # Visualization
  - matplotlib=3.8.*
  - seaborn=0.13.*
  - plotly=5.20.*

  # Jupyter
  - jupyter
  - jupyterlab=4.*
  - ipywidgets

  # Database connectors
  - pymongo=4.*
  - psycopg2=2.9.*
  - sqlalchemy=2.*

  # Web scraping
  - beautifulsoup4=4.12.*
  - requests=2.31.*
  - lxml=5.*

  # Machine Learning
  - scikit-learn=1.4.*
  - imbalanced-learn=0.12.*

  # Java (required for Spark)
  - openjdk=11

  # pip packages (not available in conda-forge)
  - pip:
    - pyspark==3.5.1
    - findspark==2.0.1
    - scrapy==2.11.*
    - pymongo[srv]==4.*
    - python-dotenv==1.0.*
    - great-expectations==0.18.*
    - delta-spark==3.1.*
    - kafka-python==2.0.*
    - faker==24.*
    - tqdm==4.*

# Activar con:
#   conda env create -f environment.yml
#   conda activate bigdata-ua
#
# Actualizar con:
#   conda env update -f environment.yml --prune
#
# Eliminar con:
#   conda env remove -n bigdata-ua
